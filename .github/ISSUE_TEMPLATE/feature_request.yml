name: Feature request
description: Suggest a new deployment, operations, or testing feature
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation or missing behavior are you trying to address?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want
      placeholder: Add support for ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?
