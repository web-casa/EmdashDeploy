name: Publish GHCR App Image

on:
  push:
    branches:
      - main
    paths:
      - 'install-emdash.sh'
      - 'lib/**'
      - 'scripts/prepare-app-context.sh'
      - '.github/workflows/publish-ghcr-app.yml'
  workflow_dispatch:
    inputs:
      template:
        description: 'EmDash template to package'
        required: true
        default: 'starter'
        type: choice
        options:
          - starter
          - blog
          - marketing
          - portfolio
          - blank

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/emdash-app

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EMDASH_INSTALL_TEMPLATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.template || 'starter' }}
      EMDASH_INSTALL_DB_DRIVER: sqlite
      EMDASH_INSTALL_SESSION_DRIVER: file
      EMDASH_INSTALL_STORAGE_DRIVER: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app build context
        id: prepare
        run: bash scripts/prepare-app-context.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.prepare.outputs.profile }}
            type=raw,value=latest,enable=${{ steps.prepare.outputs.profile == 'starter-sqlite-file-local' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.prepare.outputs.site_dir }}
          file: ${{ steps.prepare.outputs.site_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
